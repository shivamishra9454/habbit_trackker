    // ══════════════════════════════════════════════════════════════════════
    //  POMODORO VIEW
    // ══════════════════════════════════════════════════════════════════════
    const POMO_STORAGE_KEY = 'habit-tick-pomodoro-settings';

    function loadPomodoroSettings() {
      try {
        const saved = localStorage.getItem(POMO_STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch {}
      return null;
    }

    function savePomodoroSettings(settings) {
      try {
        localStorage.setItem(POMO_STORAGE_KEY, JSON.stringify(settings));
      } catch {}
    }

    function PomodoroView({ habits, addNotification }) {
      const [config, setConfig] = useState(function() {
        var saved = loadPomodoroSettings();
        return {
          workMins: (saved && saved.workMins) ? saved.workMins : 25,
          shortBreakMins: (saved && saved.shortBreakMins) ? saved.shortBreakMins : 5,
          longBreakMins: (saved && saved.longBreakMins) ? saved.longBreakMins : 15,
          sessionsUntilLong: (saved && saved.sessionsUntilLong) ? saved.sessionsUntilLong : 4,
          linkedHabitId: (saved && saved.linkedHabitId) ? saved.linkedHabitId : '',
        };
      });
      var workMins = config.workMins;
      var shortBreakMins = config.shortBreakMins;
      var longBreakMins = config.longBreakMins;
      var sessionsUntilLong = config.sessionsUntilLong;
      var linkedHabitId = config.linkedHabitId;
      const [showConfig, setShowConfig] = useState(false);

      useEffect(function() { savePomodoroSettings(config); }, [config]);

      const setWorkMins = function(v) { setConfig(function(c) { return Object.assign({}, c, { workMins: v }); }); };
      const setShortBreakMins = function(v) { setConfig(function(c) { return Object.assign({}, c, { shortBreakMins: v }); }); };
      const setLongBreakMins = function(v) { setConfig(function(c) { return Object.assign({}, c, { longBreakMins: v }); }); };
      const setSessionsUntilLong = function(v) { setConfig(function(c) { return Object.assign({}, c, { sessionsUntilLong: v }); }); };
      const setLinkedHabit = function(v) { setConfig(function(c) { return Object.assign({}, c, { linkedHabitId: v }); }); };

      // State
      const [phase, setPhase] = useState('work'); // 'work' | 'short' | 'long'
      const [sessionCount, setSessionCount] = useState(0);
      const [totalPomodoros, setTotalPomodoros] = useState(0);
      const [secondsLeft, setSecondsLeft] = useState(workMins * 60);
      const [isRunning, setIsRunning] = useState(false);
      const [task, setTask] = useState('');
      const [log, setLog] = useState([]);
      const [tickKey, setTickKey] = useState(0);
      const intervalRef = useRef(null);
      const audioCtxRef = useRef(null);

      const phaseDuration = useCallback(() => {
        if (phase === 'work') return workMins * 60;
        if (phase === 'short') return shortBreakMins * 60;
        return longBreakMins * 60;
      }, [phase, workMins, shortBreakMins, longBreakMins]);

      const totalSecs = phaseDuration();
      const progress = 1 - secondsLeft / totalSecs;
      const RADIUS = 110;
      const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
      const dashOffset = CIRCUMFERENCE * (1 - progress);

      // Ring color per phase
      const ringColor = phase === 'work' ? '#ef4444' : '#10b981';
      const glowColor = phase === 'work' ? 'rgba(239,68,68,0.4)' : 'rgba(16,185,129,0.4)';

      function playBell() {
        try {
          if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
          const ctx = audioCtxRef.current;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.4);
          gain.gain.setValueAtTime(0.4, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 1.2);
        } catch {}
      }

      function advancePhase() {
        playBell();
        if (phase === 'work') {
          const newCount = sessionCount + 1;
          const newTotal = totalPomodoros + 1;
          setSessionCount(newCount);
          setTotalPomodoros(newTotal);
          setLog(prev => [{ phase: 'work', task: task || 'Focus session', mins: workMins, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }, ...prev.slice(0, 9)]);
          if (newCount % sessionsUntilLong === 0) {
            setPhase('long'); setSecondsLeft(longBreakMins * 60);
            addNotification('🎉 Long break time! Great work.', 'success');
            createConfetti();
          } else {
            setPhase('short'); setSecondsLeft(shortBreakMins * 60);
            addNotification('☕ Short break! Stretch a bit.', 'info');
          }
        } else {
          setPhase('work'); setSecondsLeft(workMins * 60);
          addNotification('🍅 Back to work! Stay focused.', 'info');
        }
        setIsRunning(false);
      }

      useEffect(() => {
        if (isRunning) {
          intervalRef.current = setInterval(() => {
            setSecondsLeft(s => {
              if (s <= 1) { clearInterval(intervalRef.current); advancePhase(); return 0; }
              setTickKey(k => k + 1);
              return s - 1;
            });
          }, 1000);
        } else { clearInterval(intervalRef.current); }
        return () => clearInterval(intervalRef.current);
      }, [isRunning, phase]);

      function reset() {
        setIsRunning(false); setPhase('work'); setSecondsLeft(workMins * 60); setSessionCount(0);
      }

      function skipPhase() { clearInterval(intervalRef.current); advancePhase(); }

      // Sync duration when phase or config changes (while stopped)
      useEffect(() => { if (!isRunning) setSecondsLeft(phaseDuration()); }, [workMins, shortBreakMins, longBreakMins, phase]);

      const mins = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
      const secs = (secondsLeft % 60).toString().padStart(2, '0');

      const phaseLabel = phase === 'work' ? 'Focus' : phase === 'short' ? 'Short Break' : 'Long Break';
      const phaseEmoji = phase === 'work' ? '🍅' : phase === 'short' ? '☕' : '🌿';

      // Dots showing session progress
      const dots = Array.from({ length: sessionsUntilLong }, (_, i) => i < (sessionCount % sessionsUntilLong || (sessionCount > 0 && sessionCount % sessionsUntilLong === 0 ? sessionsUntilLong : 0)));

      return (
        <div className="space-y-6 animate-in max-w-4xl mx-auto">
          {/* Header */}
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-3xl font-bold flex items-center gap-3">
                <span>Pomodoro Timer</span>
                <span className="text-2xl">{phaseEmoji}</span>
              </h2>
              <p className="text-slate-400 mt-1">Deep work in focused intervals</p>
            </div>
            <button onClick={() => setShowConfig(!showConfig)}
              className={`pomo-btn p-3 rounded-xl border transition-all ${showConfig ? 'bg-slate-700 border-slate-500' : 'bg-slate-800/50 border-slate-700 hover:border-slate-500'}`}>
              <Icon name="settings" className="w-5 h-5" />
            </button>
          </div>

          {/* Config Panel */}
          {showConfig && (
            <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50 animate-in">
              <h3 className="text-lg font-semibold mb-4">Timer Settings</h3>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {[
                  { label: 'Focus (min)', value: workMins, set: setWorkMins, min: 1, max: 90 },
                  { label: 'Short Break', value: shortBreakMins, set: setShortBreakMins, min: 1, max: 30 },
                  { label: 'Long Break', value: longBreakMins, set: setLongBreakMins, min: 5, max: 60 },
                  { label: 'Sessions → Long', value: sessionsUntilLong, set: setSessionsUntilLong, min: 2, max: 8 },
                ].map(({ label, value, set, min, max }) => (
                  <div key={label}>
                    <label className="block text-xs text-slate-400 mb-2">{label}</label>
                    <div className="flex items-center gap-2">
                      <button onClick={() => { set(Math.max(min, value - 1)); }} className="w-8 h-8 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-bold flex items-center justify-center">−</button>
                      <span className="w-8 text-center font-bold">{value}</span>
                      <button onClick={() => { set(Math.min(max, value + 1)); }} className="w-8 h-8 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-bold flex items-center justify-center">+</button>
                    </div>
                  </div>
                ))}
              </div>
              {habits.length > 0 && (
                <div className="mt-4 pt-4 border-t border-slate-700">
                  <label className="block text-xs text-slate-400 mb-2">Link to Habit (auto-log time)</label>
                  <select value={linkedHabitId} onChange={e => setLinkedHabit(e.target.value)}
                    className="w-full md:w-64 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm focus:outline-none focus:border-emerald-500">
                    <option value="">— None —</option>
                    {habits.filter(h => h.type === 'time' || h.type === 'check').map(h => (
                      <option key={h.id} value={h.id}>{h.icon} {h.name}</option>
                    ))}
                  </select>
                </div>
              )}
            </div>
          )}

          <div className="grid md:grid-cols-[1fr_320px] gap-6">
            {/* ── Main Timer ── */}
            <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-slate-700/50 p-8 flex flex-col items-center gap-6">
              {/* Phase tabs */}
              <div className="flex gap-2 bg-slate-900/60 rounded-xl p-1.5 w-full max-w-xs">
                {[{ id: 'work', label: 'Focus' }, { id: 'short', label: 'Short Break' }, { id: 'long', label: 'Long Break' }].map(p => (
                  <button key={p.id} onClick={() => { if (!isRunning) { setPhase(p.id); setSecondsLeft(p.id === 'work' ? workMins * 60 : p.id === 'short' ? shortBreakMins * 60 : longBreakMins * 60); }}}
                    className={`flex-1 py-1.5 rounded-lg text-xs font-semibold transition-all ${phase === p.id ? (p.id === 'work' ? 'bg-red-500/80 text-white' : 'bg-emerald-500/80 text-white') : 'text-slate-400 hover:text-white'}`}>
                    {p.label}
                  </button>
                ))}
              </div>

              {/* Task input */}
              <input value={task} onChange={e => setTask(e.target.value)} placeholder="What are you working on?"
                className="w-full max-w-xs px-4 py-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-sm text-center focus:outline-none focus:border-emerald-500 text-slate-200 placeholder-slate-500" />

              {/* SVG Ring */}
              <div className="relative flex items-center justify-center" style={{ filter: isRunning ? `drop-shadow(0 0 20px ${glowColor})` : 'none', transition: 'filter 0.5s ease' }}>
                <svg width="280" height="280" viewBox="0 0 280 280">
                  <circle className="pomodoro-ring-track" cx="140" cy="140" r={RADIUS} />
                  <circle className="pomodoro-ring-progress pomodoro-ring" cx="140" cy="140" r={RADIUS}
                    stroke={ringColor} strokeDasharray={CIRCUMFERENCE} strokeDashoffset={dashOffset} />
                </svg>
                {/* Center content */}
                <div className="absolute flex flex-col items-center gap-1">
                  <div key={tickKey} className={`text-6xl font-black tracking-tight tabular-nums ${isRunning ? '' : ''}`}
                    style={{ fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.02em' }}>
                    {mins}:{secs}
                  </div>
                  <div className={`text-sm font-semibold px-3 py-1 rounded-full ${phase === 'work' ? 'text-red-400 bg-red-500/15' : 'text-emerald-400 bg-emerald-500/15'}`}>
                    {phaseLabel}
                  </div>
                  {/* Session dots */}
                  <div className="flex gap-2 mt-2">
                    {Array.from({ length: sessionsUntilLong }, (_, i) => {
                      const done = phase === 'work'
                        ? i < (sessionCount % sessionsUntilLong)
                        : i < Math.min(sessionCount % sessionsUntilLong, sessionsUntilLong);
                      return (
                        <div key={i} className={`w-2.5 h-2.5 rounded-full transition-all ${done ? 'bg-red-400 scale-110' : 'bg-slate-600'}`} />
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* Controls */}
              <div className="flex items-center gap-3">
                <button onClick={reset} className="pomo-btn w-12 h-12 bg-slate-700/80 hover:bg-slate-600 rounded-xl flex items-center justify-center border border-slate-600" title="Reset">
                  <Icon name="refresh" className="w-5 h-5 text-slate-300" />
                </button>
                <button onClick={() => setIsRunning(!isRunning)}
                  className={`pomo-btn w-20 h-20 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg border-2 transition-all ${isRunning ? 'bg-slate-700 border-slate-500 hover:bg-slate-600' : phase === 'work' ? 'bg-red-500 border-red-400 hover:bg-red-600' : 'bg-emerald-500 border-emerald-400 hover:bg-emerald-600'} ${isRunning ? (phase === 'work' ? 'work-pulse' : 'break-pulse') : ''}`}>
                  {isRunning ? <Icon name="pause" className="w-8 h-8" /> : <Icon name="play" className="w-8 h-8 ml-1" />}
                </button>
                <button onClick={skipPhase} className="pomo-btn w-12 h-12 bg-slate-700/80 hover:bg-slate-600 rounded-xl flex items-center justify-center border border-slate-600" title="Skip phase">
                  <Icon name="skipForward" className="w-5 h-5 text-slate-300" />
                </button>
              </div>
            </div>

            {/* ── Right Panel: Stats + Log ── */}
            <div className="flex flex-col gap-4">
              {/* Today's stats */}
              <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-slate-700/50 p-5">
                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Today's Stats</h3>
                <div className="grid grid-cols-2 gap-3">
                  <div className="bg-slate-900/60 rounded-xl p-3 text-center">
                    <div className="text-2xl font-black text-red-400">{totalPomodoros}</div>
                    <div className="text-xs text-slate-500 mt-1">Pomodoros</div>
                  </div>
                  <div className="bg-slate-900/60 rounded-xl p-3 text-center">
                    <div className="text-2xl font-black text-emerald-400">{totalPomodoros * workMins}</div>
                    <div className="text-xs text-slate-500 mt-1">Minutes focused</div>
                  </div>
                  <div className="bg-slate-900/60 rounded-xl p-3 text-center col-span-2">
                    <div className="text-sm font-semibold text-slate-300">
                      {totalPomodoros === 0 ? 'Start your first session!' :
                       totalPomodoros < 4 ? 'Good start, keep going! 💪' :
                       totalPomodoros < 8 ? 'On a roll! 🔥' : 'Incredible focus day! 🏆'}
                    </div>
                  </div>
                </div>
              </div>

              {/* How it works */}
              <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-slate-700/50 p-5">
                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">How it works</h3>
                <ol className="space-y-2.5">
                  {[
                    { n: '1', text: `Focus for ${workMins} minutes`, color: 'text-red-400', bg: 'bg-red-500/10' },
                    { n: '2', text: 'Take a short break', color: 'text-emerald-400', bg: 'bg-emerald-500/10' },
                    { n: '3', text: `Every ${sessionsUntilLong} sessions → long break`, color: 'text-cyan-400', bg: 'bg-cyan-500/10' },
                    { n: '4', text: 'Repeat and build focus!', color: 'text-purple-400', bg: 'bg-purple-500/10' },
                  ].map(step => (
                    <li key={step.n} className={`flex items-start gap-3 p-2.5 rounded-lg ${step.bg}`}>
                      <span className={`font-black text-sm ${step.color} min-w-[20px]`}>{step.n}</span>
                      <span className="text-sm text-slate-300">{step.text}</span>
                    </li>
                  ))}
                </ol>
              </div>

              {/* Session log */}
              {log.length > 0 && (
                <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-slate-700/50 p-5">
                  <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Recent Sessions</h3>
                  <div className="space-y-2">
                    {log.slice(0, 5).map((entry, i) => (
                      <div key={i} className="session-pop flex items-center justify-between py-2 border-b border-slate-700/50 last:border-0">
                        <div className="flex items-center gap-2">
                          <span className="text-sm">🍅</span>
                          <span className="text-sm text-slate-300 truncate max-w-[140px]">{entry.task}</span>
                        </div>
                        <div className="flex items-center gap-2 shrink-0">
                          <span className="text-xs text-red-400 font-semibold">{entry.mins}m</span>
                          <span className="text-xs text-slate-500">{entry.time}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }


    // ══════════════════════════════════════════════════════════════════════
    //  TODO VIEW
    // ══════════════════════════════════════════════════════════════════════
    const TODO_STORAGE_KEY = 'habit-tick-todos';

    function loadTodos() {
      try {
        var saved = localStorage.getItem(TODO_STORAGE_KEY);
        return saved ? JSON.parse(saved) : [];
      } catch(e) { return []; }
    }

    function saveTodos(todos) {
      try { localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(todos)); } catch(e) {}
    }

    function TodoView({ addNotification }) {
      const [todos, setTodos] = useState(function() { return loadTodos(); });
      const [input, setInput] = useState('');
      const [priority, setPriority] = useState('medium');
      const [repeatDaily, setRepeatDaily] = useState(false);
      const [filter, setFilter] = useState('all');
      const [editingId, setEditingId] = useState(null);
      const [editText, setEditText] = useState('');
      const inputRef = React.useRef(null);
      const today = new Date().toISOString().split('T')[0];

      useEffect(function() { saveTodos(todos); }, [todos]);

      useEffect(function() {
        setTodos(function(prev) {
          var changed = false;
          var updated = prev.map(function(t) {
            if (t.repeatDaily && t.completedDate && t.completedDate !== today) {
              changed = true;
              return Object.assign({}, t, { completed: false, completedDate: null });
            }
            return t;
          });
          return changed ? updated : prev;
        });
      }, [today]);

      function addTodo() {
        var text = input.trim();
        if (!text) return;
        var newTodo = {
          id: Date.now().toString(),
          text: text,
          completed: false,
          completedDate: null,
          priority: priority,
          repeatDaily: repeatDaily,
          createdAt: Date.now(),
        };
        setTodos(function(prev) { return [newTodo, ...prev]; });
        setInput('');
        setRepeatDaily(false);
        setPriority('medium');
        addNotification('Task added!', 'success');
        if (inputRef.current) inputRef.current.focus();
      }

      function toggleTodo(id) {
        setTodos(function(prev) {
          return prev.map(function(t) {
            if (t.id !== id) return t;
            var nowDone = !t.completed;
            return Object.assign({}, t, { completed: nowDone, completedDate: nowDone ? today : null });
          });
        });
      }

      function deleteTodo(id) {
        setTodos(function(prev) { return prev.filter(function(t) { return t.id !== id; }); });
        addNotification('Task deleted', 'info');
      }

      function clearCompleted() {
        setTodos(function(prev) { return prev.filter(function(t) { return !t.completed; }); });
        addNotification('Completed tasks cleared', 'info');
      }

      function saveEdit(id) {
        var text = editText.trim();
        if (!text) return;
        setTodos(function(prev) {
          return prev.map(function(t) { return t.id === id ? Object.assign({}, t, { text: text }) : t; });
        });
        setEditingId(null);
        setEditText('');
      }

      function toggleRepeat(id) {
        setTodos(function(prev) {
          return prev.map(function(t) { return t.id === id ? Object.assign({}, t, { repeatDaily: !t.repeatDaily }) : t; });
        });
      }

      var filtered = todos.filter(function(t) {
        if (filter === 'active') return !t.completed;
        if (filter === 'completed') return t.completed;
        if (filter === 'daily') return t.repeatDaily;
        return true;
      });

      var totalCount = todos.length;
      var doneCount = todos.filter(function(t) { return t.completed; }).length;
      var activeCount = totalCount - doneCount;
      var dailyCount = todos.filter(function(t) { return t.repeatDaily; }).length;
      var progressPct = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;

      var priColors = {
        high: 'text-red-400 bg-red-500/15 border-red-500/30',
        medium: 'text-amber-400 bg-amber-500/15 border-amber-500/30',
        low: 'text-emerald-400 bg-emerald-500/15 border-emerald-500/30'
      };
      var priDot = { high: 'bg-red-400', medium: 'bg-amber-400', low: 'bg-emerald-400' };
      var priLabel = { high: 'High', medium: 'Med', low: 'Low' };

      return (
        <div className="space-y-6 animate-in max-w-3xl mx-auto">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-3xl font-bold flex items-center gap-3">
                To-Do List <span className="text-2xl">📝</span>
              </h2>
              <p className="text-slate-400 mt-1">Stay on top of your tasks</p>
            </div>
            {doneCount > 0 && (
              <button onClick={clearCompleted} className="px-3 py-2 text-sm bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white rounded-lg transition-all border border-slate-700 flex items-center gap-2">
                <Icon name="trash" className="w-4 h-4" /> Clear done
              </button>
            )}
          </div>

          {totalCount > 0 && (
            <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-5 border border-slate-700/50">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-3 text-sm flex-wrap">
                  <span className="text-slate-400">{activeCount} remaining</span>
                  <span className="text-slate-600">·</span>
                  <span className="text-emerald-400">{doneCount} done</span>
                  {dailyCount > 0 && (
                    <><span className="text-slate-600">·</span><span className="text-cyan-400">{dailyCount} daily</span></>
                  )}
                </div>
                <span className="text-2xl font-black">{progressPct}%</span>
              </div>
              <div className="h-2.5 bg-slate-700 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-full transition-all duration-500" style={{ width: progressPct + '%' }} />
              </div>
            </div>
          )}

          <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-5 border border-slate-700/50 space-y-4">
            <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider">New Task</h3>
            <div className="flex gap-2">
              <input
                ref={inputRef}
                value={input}
                onChange={function(e) { setInput(e.target.value); }}
                onKeyDown={function(e) { if (e.key === 'Enter') addTodo(); }}
                placeholder="What needs to be done?"
                className="flex-1 px-4 py-3 bg-slate-900/70 border border-slate-700 rounded-xl focus:outline-none focus:border-emerald-500 text-white placeholder-slate-500 text-sm"
              />
              <button onClick={addTodo} className="px-4 py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-600 hover:to-cyan-600 rounded-xl font-semibold transition-all flex items-center gap-2 text-sm whitespace-nowrap">
                <Icon name="plus" className="w-4 h-4" /> Add
              </button>
            </div>
            <div className="flex items-center gap-3 flex-wrap">
              <div className="flex items-center gap-1 bg-slate-900/60 rounded-lg p-1">
                {['low','medium','high'].map(function(p) {
                  return (
                    <button key={p} onClick={function() { setPriority(p); }}
                      className={'px-3 py-1.5 rounded-md text-xs font-semibold transition-all ' + (priority === p ? priColors[p] + ' border' : 'text-slate-500 hover:text-slate-300')}>
                      {p.charAt(0).toUpperCase() + p.slice(1)}
                    </button>
                  );
                })}
              </div>
              <button onClick={function() { setRepeatDaily(function(v) { return !v; }); }}
                className={'flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all border ' + (repeatDaily ? 'bg-cyan-500/15 text-cyan-400 border-cyan-500/30' : 'bg-slate-900/60 text-slate-500 border-slate-700 hover:text-slate-300')}>
                <Icon name="repeat" className="w-3.5 h-3.5" />
                Repeat daily
              </button>
            </div>
          </div>

          <div className="flex gap-1 bg-slate-800/50 rounded-xl p-1.5 border border-slate-700/50">
            {[
              { id: 'all', label: 'All', count: totalCount },
              { id: 'active', label: 'Active', count: activeCount },
              { id: 'completed', label: 'Done', count: doneCount },
              { id: 'daily', label: 'Daily', count: dailyCount },
            ].map(function(f) {
              return (
                <button key={f.id} onClick={function() { setFilter(f.id); }}
                  className={'flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-sm font-semibold transition-all ' + (filter === f.id ? 'bg-slate-700 text-white' : 'text-slate-500 hover:text-slate-300')}>
                  {f.label}
                  {f.count > 0 && (
                    <span className={'text-xs px-1.5 py-0.5 rounded-full font-bold ' + (filter === f.id ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700/50 text-slate-400')}>
                      {f.count}
                    </span>
                  )}
                </button>
              );
            })}
          </div>

          <div className="space-y-2">
            {filtered.length === 0 && (
              <div className="text-center py-14">
                <div className="text-5xl mb-3">{filter === 'completed' ? '🎉' : filter === 'daily' ? '🔄' : '📭'}</div>
                <p className="text-slate-400">
                  {filter === 'completed' ? 'No completed tasks yet' :
                   filter === 'daily' ? 'No daily recurring tasks' :
                   filter === 'active' ? 'All caught up!' : 'No tasks yet. Add one above!'}
                </p>
              </div>
            )}
            {filtered.map(function(todo) {
              var isEditing = editingId === todo.id;
              return (
                <div key={todo.id}
                  className={'group flex items-start gap-3 p-4 rounded-2xl border transition-all ' + (todo.completed ? 'bg-slate-800/20 border-slate-700/30 opacity-60' : 'bg-slate-800/50 border-slate-700/50 hover:border-slate-600')}>
                  <button onClick={function() { toggleTodo(todo.id); }}
                    className={'mt-0.5 w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all ' + (todo.completed ? 'bg-emerald-500 border-emerald-500' : 'border-slate-500 hover:border-emerald-400')}>
                    {todo.completed && <Icon name="check" className="w-3.5 h-3.5 text-white" />}
                  </button>
                  <div className="flex-1 min-w-0">
                    {isEditing ? (
                      <div className="flex gap-2">
                        <input autoFocus value={editText}
                          onChange={function(e) { setEditText(e.target.value); }}
                          onKeyDown={function(e) {
                            if (e.key === 'Enter') saveEdit(todo.id);
                            if (e.key === 'Escape') { setEditingId(null); setEditText(''); }
                          }}
                          className="flex-1 px-3 py-1.5 bg-slate-700 border border-emerald-500 rounded-lg text-sm focus:outline-none text-white"
                        />
                        <button onClick={function() { saveEdit(todo.id); }} className="px-3 py-1.5 bg-emerald-500 hover:bg-emerald-600 rounded-lg text-xs font-semibold transition-all">Save</button>
                        <button onClick={function() { setEditingId(null); setEditText(''); }} className="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs transition-all">Cancel</button>
                      </div>
                    ) : (
                      <span className={'text-sm font-medium ' + (todo.completed ? 'line-through text-slate-500' : 'text-slate-100')}>{todo.text}</span>
                    )}
                    {!isEditing && (
                      <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                        <span className={'text-xs px-2 py-0.5 rounded-full border font-semibold flex items-center gap-1.5 ' + priColors[todo.priority]}>
                          <span className={'w-1.5 h-1.5 rounded-full flex-shrink-0 ' + priDot[todo.priority]}></span>
                          {priLabel[todo.priority]}
                        </span>
                        {todo.repeatDaily && (
                          <span className="text-xs px-2 py-0.5 rounded-full border bg-cyan-500/10 text-cyan-400 border-cyan-500/20 flex items-center gap-1 font-semibold">
                            <Icon name="repeat" className="w-3 h-3" /> Daily
                          </span>
                        )}
                        {todo.completed && todo.completedDate && (
                          <span className="text-xs text-slate-500">Completed today</span>
                        )}
                      </div>
                    )}
                  </div>
                  {!isEditing && (
                    <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                      <button onClick={function() { toggleRepeat(todo.id); }}
                        title={todo.repeatDaily ? 'Remove daily repeat' : 'Set as daily'}
                        className={'p-1.5 rounded-lg transition-all ' + (todo.repeatDaily ? 'text-cyan-400 bg-cyan-500/10' : 'text-slate-500 hover:text-cyan-400 hover:bg-slate-700')}>
                        <Icon name="repeat" className="w-4 h-4" />
                      </button>
                      <button onClick={function() { setEditingId(todo.id); setEditText(todo.text); }}
                        className="p-1.5 rounded-lg text-slate-500 hover:text-white hover:bg-slate-700 transition-all">
                        <Icon name="edit" className="w-4 h-4" />
                      </button>
                      <button onClick={function() { deleteTodo(todo.id); }}
                        className="p-1.5 rounded-lg text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-all">
                        <Icon name="trash" className="w-4 h-4" />
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Today View ─────────────────────────────────────────────────────────
    function TodayView({ habits, currentDate, toggleHabit, updateHabitValue, onHabitClick, onAddClick, addNotification, settings }) {
      const todayStr = currentDate.toISOString().split('T')[0];
      const todayHabits = habits.filter(h => h.goal === 'daily' || h.goal === 'weekly');

      const handleToggle = (habitId) => {
        toggleHabit(habitId, currentDate);
        const habit = habits.find(h => h.id === habitId);
        const wasCompleted = habit.completions[todayStr]?.completed;
        if (!wasCompleted) {
          addNotification('✅ Habit completed!', 'success');
          const streak = getCurrentStreak(habit);
          if (streak > 0 && streak % 7 === 0) { createConfetti(); addNotification(`🎉 ${streak} day streak!`, 'success'); }
        }
      };

      const completedToday = todayHabits.filter(h => h.completions[todayStr]?.completed).length;
      const totalToday = todayHabits.length;
      const progressPercent = totalToday > 0 ? (completedToday / totalToday) * 100 : 0;

      return (
        <div className="space-y-6 animate-in">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-3xl font-bold">Today's Habits</h2>
              <p className="text-slate-400 mt-1">{new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</p>
            </div>
            <button onClick={onAddClick} className="px-4 py-2 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-lg hover:from-emerald-600 hover:to-cyan-600 transition-all flex items-center gap-2">
              <Icon name="plus" className="w-5 h-5" /> Add Habit
            </button>
          </div>
          {totalToday > 0 && (
            <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
              <div className="flex items-center justify-between mb-4">
                <div><h3 className="text-lg font-semibold">Daily Progress</h3><p className="text-slate-400 text-sm">{completedToday} of {totalToday} completed</p></div>
                <div className="text-3xl font-bold">{Math.round(progressPercent)}%</div>
              </div>
              <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 transition-all duration-500" style={{ width: `${progressPercent}%` }} />
              </div>
            </div>
          )}
          {todayHabits.length === 0 && (
            <div className="text-center py-16">
              <div className="text-6xl mb-4">🎯</div>
              <p className="text-slate-400 text-lg mb-4">No habits yet. Create your first one!</p>
              <button onClick={onAddClick} className="px-6 py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-lg hover:from-emerald-600 hover:to-cyan-600 transition-all">
                <Icon name="plus" className="w-5 h-5 inline mr-2" /> Create Habit
              </button>
            </div>
          )}
          <div className="grid gap-4">
            {todayHabits.map(habit => {
              const isCompleted = habit.completions[todayStr]?.completed;
              const value = habit.completions[todayStr]?.value || 0;
              return (
                <div key={habit.id} className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50 hover:border-slate-600 transition-all cursor-pointer group habit-card">
                  <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-4 flex-1" onClick={() => onHabitClick(habit.id)}>
                      <div className="w-14 h-14 rounded-xl flex items-center justify-center text-2xl transition-transform group-hover:scale-110" style={{ backgroundColor: habit.color + '20', border: `2px solid ${habit.color}` }}>{habit.icon}</div>
                      <div className="flex-1">
                        <h3 className="text-lg font-semibold">{habit.name}</h3>
                        <div className="flex items-center gap-4 mt-1">
                          <StreakBadge habit={habit} />
                          {habit.reminder && <div className="flex items-center gap-1 text-xs text-slate-400"><Icon name="bell" className="w-3 h-3" />{habit.reminder}</div>}
                        </div>
                      </div>
                    </div>
                    <div onClick={e => e.stopPropagation()}>
                      {habit.type === 'check' && (
                        <button onClick={() => handleToggle(habit.id)} className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${isCompleted ? 'bg-gradient-to-br from-emerald-500 to-cyan-500' : 'border-2 border-slate-600 hover:border-emerald-500'}`}>
                          {isCompleted && <Icon name="check" className="w-6 h-6" />}
                        </button>
                      )}
                      {habit.type === 'time' && <Timer habit={habit} currentDate={currentDate} onSave={(mins) => { updateHabitValue(habit.id, currentDate, mins); addNotification(`⏱️ ${mins} minutes logged!`, 'success'); }} />}
                      {habit.type === 'counter' && <Counter habit={habit} currentDate={currentDate} value={value} onUpdate={(v) => updateHabitValue(habit.id, currentDate, v)} />}
                    </div>
                  </div>
                  <div className="pt-4 border-t border-slate-700/50"><MiniProgressGrid habit={habit} /></div>
                  {habit.note && <div className="mt-4 pt-4 border-t border-slate-700/50 text-sm text-slate-400"><Icon name="note" className="w-4 h-4 inline mr-2" />{habit.note}</div>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Calendar View ──────────────────────────────────────────────────────
    function CalendarView({ habits, currentDate, setCurrentDate, onHabitClick }) {
      const [viewMonth, setViewMonth] = useState(new Date());
      const daysInMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0).getDate();
      const firstDay = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1).getDay();
      const prevMonth = () => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1));
      const nextMonth = () => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1));
      return (
        <div className="space-y-6 animate-in">
          <div className="flex items-center justify-between">
            <h2 className="text-3xl font-bold">Calendar</h2>
            <div className="flex items-center gap-4">
              <button onClick={prevMonth} className="p-2 hover:bg-slate-800 rounded-lg transition-all"><Icon name="chevronLeft" className="w-5 h-5" /></button>
              <span className="text-lg font-semibold min-w-[180px] text-center">{viewMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</span>
              <button onClick={nextMonth} className="p-2 hover:bg-slate-800 rounded-lg transition-all"><Icon name="chevronRight" className="w-5 h-5" /></button>
            </div>
          </div>
          {habits.length === 0 && <div className="text-center py-16"><div className="text-6xl mb-4">📅</div><p className="text-slate-400 text-lg">No habits to display</p></div>}
          {habits.map(habit => (
            <div key={habit.id} className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-10 h-10 rounded-lg flex items-center justify-center text-xl" style={{ backgroundColor: habit.color + '20', border: `2px solid ${habit.color}` }}>{habit.icon}</div>
                <div className="flex-1"><h3 className="text-lg font-semibold">{habit.name}</h3><StreakBadge habit={habit} /></div>
              </div>
              <div className="grid grid-cols-7 gap-2">
                {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(day => <div key={day} className="text-center text-xs text-slate-500 font-medium py-2">{day}</div>)}
                {[...Array(firstDay)].map((_, i) => <div key={`e-${i}`} />)}
                {[...Array(daysInMonth)].map((_, i) => {
                  const day = i + 1;
                  const date = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), day);
                  const dateStr = date.toISOString().split('T')[0];
                  const isCompleted = habit.completions[dateStr]?.completed;
                  const isToday = dateStr === new Date().toISOString().split('T')[0];
                  return (
                    <div key={day} className={`aspect-square rounded-lg flex items-center justify-center text-sm transition-all cursor-pointer ${isCompleted ? 'opacity-100' : 'bg-slate-700/30 opacity-50'} ${isToday ? 'ring-2 ring-cyan-400' : ''}`}
                      style={isCompleted ? { backgroundColor: habit.color } : {}}>{day}</div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ── Analytics View ─────────────────────────────────────────────────────
    function AnalyticsView({ habits }) {
      const overallStats = useMemo(() => {
        if (habits.length === 0) return null;
        const allCompletions = habits.flatMap(h => Object.keys(h.completions));
        const uniqueDays = new Set(allCompletions).size;
        const totalCompletions = allCompletions.length;
        const avgPerDay = uniqueDays > 0 ? (totalCompletions / uniqueDays).toFixed(1) : 0;
        return { uniqueDays, totalCompletions, avgPerDay };
      }, [habits]);
      return (
        <div className="space-y-6 animate-in">
          <h2 className="text-3xl font-bold">Analytics</h2>
          {overallStats && (
            <div className="grid md:grid-cols-3 gap-4">
              {[
                { icon: 'calendar', color: 'text-emerald-400', label: 'Active Days', value: overallStats.uniqueDays },
                { icon: 'check', color: 'text-cyan-400', label: 'Total Completions', value: overallStats.totalCompletions },
                { icon: 'trendingUp', color: 'text-orange-400', label: 'Avg Per Day', value: overallStats.avgPerDay },
              ].map(s => (
                <div key={s.label} className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
                  <div className="flex items-center gap-3 mb-2"><Icon name={s.icon} className={`w-5 h-5 ${s.color}`} /><span className="text-slate-400">{s.label}</span></div>
                  <p className="text-3xl font-bold">{s.value}</p>
                </div>
              ))}
            </div>
          )}
          {habits.length === 0 && <div className="text-center py-16"><div className="text-6xl mb-4">📊</div><p className="text-slate-400 text-lg">No analytics to display</p></div>}
          <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            {habits.map(habit => {
              const stats = calculateStats(habit);
              return (
                <div key={habit.id} className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
                  <div className="flex items-center gap-3 mb-6">
                    <div className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl" style={{ backgroundColor: habit.color + '20', border: `2px solid ${habit.color}` }}>{habit.icon}</div>
                    <h3 className="text-lg font-semibold">{habit.name}</h3>
                  </div>
                  <div className="space-y-4">
                    {[
                      { label: 'Current Streak', value: stats.currentStreak, icon: 'flame', color: 'text-orange-400' },
                      { label: 'Best Streak', value: stats.bestStreak, icon: 'trophy', color: 'text-yellow-400' },
                      { label: '30-Day Rate', value: `${stats.completionRate}%`, icon: null },
                      { label: '7-Day Rate', value: `${stats.weeklyRate}%`, icon: null },
                      { label: 'Total Days', value: stats.totalDays, icon: null },
                    ].map(s => (
                      <div key={s.label} className="flex justify-between items-center">
                        <span className="text-slate-400">{s.label}</span>
                        <div className="flex items-center gap-2">
                          {s.icon && <Icon name={s.icon} className={`w-4 h-4 ${s.color}`} />}
                          <span className="text-xl font-bold">{s.value}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="mt-6 pt-4 border-t border-slate-700/50">
                    <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                      <div className="h-full transition-all" style={{ width: `${stats.completionRate}%`, backgroundColor: habit.color }} />
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Settings View ──────────────────────────────────────────────────────
    function SettingsView({ settings, onSettingsChange, habits, onExport, onImport, addNotification }) {
      const fileInputRef = useRef(null);
      const handleImport = (e) => {
        const file = e.target.files[0];
        if (file) importData(file, (imported) => { onImport(imported); addNotification('✅ Data imported successfully!', 'success'); });
      };
      const handleClearData = () => {
        if (confirm('Are you sure you want to clear all data? This cannot be undone.')) { localStorage.removeItem('habit-tick-data'); window.location.reload(); }
      };
      return (
        <div className="space-y-6 animate-in max-w-3xl mx-auto">
          <h2 className="text-3xl font-bold">Settings</h2>
          <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
            <h3 className="text-xl font-semibold mb-4 flex items-center gap-2"><Icon name="moon" className="w-5 h-5" />Theme</h3>
            <label className="flex items-center justify-between">
              <span className="text-slate-400">Dark Mode</span>
              <input type="checkbox" checked={settings.darkMode} onChange={e => onSettingsChange({ ...settings, darkMode: e.target.checked })}
                className="w-12 h-6 rounded-full appearance-none bg-slate-600 checked:bg-emerald-500 relative cursor-pointer transition-colors before:content-[''] before:absolute before:w-5 before:h-5 before:rounded-full before:bg-white before:left-0.5 before:top-0.5 before:transition-transform checked:before:translate-x-6" />
            </label>
          </div>
          <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
            <h3 className="text-xl font-semibold mb-4 flex items-center gap-2"><Icon name="bell" className="w-5 h-5" />Notifications</h3>
            <div className="space-y-3">
              {[{ label: 'Enable Reminders', key: 'reminders' }, { label: 'Completion Sounds', key: 'sounds' }].map(({ label, key }) => (
                <label key={key} className="flex items-center justify-between">
                  <span className="text-slate-400">{label}</span>
                  <input type="checkbox" checked={settings[key]} onChange={e => onSettingsChange({ ...settings, [key]: e.target.checked })}
                    className="w-12 h-6 rounded-full appearance-none bg-slate-600 checked:bg-emerald-500 relative cursor-pointer transition-colors before:content-[''] before:absolute before:w-5 before:h-5 before:rounded-full before:bg-white before:left-0.5 before:top-0.5 before:transition-transform checked:before:translate-x-6" />
                </label>
              ))}
            </div>
          </div>
          <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
            <h3 className="text-xl font-semibold mb-4 flex items-center gap-2"><Icon name="download" className="w-5 h-5" />Backup & Restore</h3>
            <div className="space-y-3">
              <button onClick={() => { exportData(habits); addNotification('✅ Backup downloaded!', 'success'); }} className="w-full px-4 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all flex items-center justify-center gap-2"><Icon name="download" className="w-5 h-5" />Export Data</button>
              <button onClick={() => fileInputRef.current?.click()} className="w-full px-4 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all flex items-center justify-center gap-2"><Icon name="upload" className="w-5 h-5" />Import Data</button>
              <input ref={fileInputRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
            </div>
          </div>
          <div className="bg-red-500/10 backdrop-blur-sm rounded-2xl p-6 border border-red-500/30">
            <h3 className="text-xl font-semibold mb-4 text-red-400 flex items-center gap-2"><Icon name="trash" className="w-5 h-5" />Danger Zone</h3>
            <button onClick={handleClearData} className="w-full px-4 py-3 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded-lg transition-all">Clear All Data</button>
          </div>
          <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
            <h3 className="text-xl font-semibold mb-4">About</h3>
            <div className="space-y-2 text-slate-400">
              <p><strong className="text-white">Habit Tick</strong> v1.0</p>
              <p>Build lasting habits with beautiful visualizations</p>
              <p className="text-sm">All data stored locally in your browser</p>
            </div>
          </div>
        </div>
      );
    }

    // ── Add/Edit Habit Modal ───────────────────────────────────────────────
    function AddHabitModal({ onClose, onAdd, editHabit }) {
      const [name, setName] = useState(editHabit?.name || '');
      const [icon, setIcon] = useState(editHabit?.icon || '✅');
      const [color, setColor] = useState(editHabit?.color || '#8B5CF6');
      const [type, setType] = useState(editHabit?.type || 'check');
      const [goal, setGoal] = useState(editHabit?.goal || 'daily');
      const [reminder, setReminder] = useState(editHabit?.reminder || '');
      const [note, setNote] = useState(editHabit?.note || '');
      const [targetMinutes, setTargetMinutes] = useState(editHabit?.targetMinutes || 30);
      const [targetCount, setTargetCount] = useState(editHabit?.targetCount || 8);
      const colors = ['#8B5CF6','#10B981','#F59E0B','#3B82F6','#EC4899','#14B8A6','#EF4444','#6366F1','#F97316','#84CC16'];
      const icons = ['✅','🧘','📚','💪','💧','💻','✨','🎯','🏃','🎨','🎵','🍎','😴','🧠','❤️','🌟','🔥','⚡','🌱','🎓'];
      const handleSubmit = (e) => {
        e.preventDefault(); if (!name.trim()) return;
        const habitData = { name: name.trim(), icon, color, type, goal, reminder: reminder.trim(), note: note.trim(), targetMinutes: type === 'time' ? targetMinutes : undefined, targetCount: type === 'counter' ? targetCount : undefined };
        onAdd(editHabit ? { ...editHabit, ...habitData } : habitData);
      };
      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in">
          <div className="bg-slate-900 rounded-2xl max-w-2xl w-full border border-slate-700 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div className="flex items-center justify-between p-6 border-b border-slate-700 sticky top-0 bg-slate-900 z-10">
              <h3 className="text-xl font-bold">{editHabit ? 'Edit Habit' : 'New Habit'}</h3>
              <button onClick={onClose} className="p-2 hover:bg-slate-800 rounded-lg transition-all"><Icon name="x" className="w-5 h-5" /></button>
            </div>
            <form onSubmit={handleSubmit} className="p-6 space-y-6">
              <div>
                <label className="block text-sm font-medium mb-2">Habit Name *</label>
                <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white" placeholder="e.g., Morning Meditation" autoFocus required />
              </div>
              <div>
                <label className="block text-sm font-medium mb-2">Icon</label>
                <div className="grid grid-cols-10 gap-2">
                  {icons.map(i => <button key={i} type="button" onClick={() => setIcon(i)} className={`aspect-square rounded-lg flex items-center justify-center text-2xl transition-all ${icon === i ? 'bg-slate-700 ring-2 ring-emerald-500' : 'bg-slate-800 hover:bg-slate-700'}`}>{i}</button>)}
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium mb-2">Color</label>
                <div className="grid grid-cols-10 gap-2">
                  {colors.map(c => <button key={c} type="button" onClick={() => setColor(c)} className={`aspect-square rounded-lg transition-all ${color === c ? 'ring-2 ring-white ring-offset-2 ring-offset-slate-900' : ''}`} style={{ backgroundColor: c }} />)}
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium mb-2">Type</label>
                <div className="grid grid-cols-3 gap-2">
                  {[{ value: 'check', label: 'Checkmark', desc: 'Simple yes/no' }, { value: 'time', label: 'Timer', desc: 'Track minutes' }, { value: 'counter', label: 'Counter', desc: 'Count times' }].map(t => (
                    <button key={t.value} type="button" onClick={() => setType(t.value)} className={`px-4 py-3 rounded-lg transition-all text-left ${type === t.value ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                      <div className="font-semibold">{t.label}</div><div className="text-xs opacity-75">{t.desc}</div>
                    </button>
                  ))}
                </div>
              </div>
              {type === 'time' && <div><label className="block text-sm font-medium mb-2">Target Minutes</label><input type="number" value={targetMinutes} onChange={e => setTargetMinutes(parseInt(e.target.value))} className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white" min="1" /></div>}
              {type === 'counter' && <div><label className="block text-sm font-medium mb-2">Target Count</label><input type="number" value={targetCount} onChange={e => setTargetCount(parseInt(e.target.value))} className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white" min="1" /></div>}
              <div>
                <label className="block text-sm font-medium mb-2">Goal Frequency</label>
                <div className="grid grid-cols-2 gap-2">
                  {[{ value: 'daily', label: 'Daily' }, { value: 'weekly', label: 'Weekly' }].map(g => (
                    <button key={g.value} type="button" onClick={() => setGoal(g.value)} className={`px-4 py-2 rounded-lg transition-all ${goal === g.value ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{g.label}</button>
                  ))}
                </div>
              </div>
              <div><label className="block text-sm font-medium mb-2"><Icon name="bell" className="w-4 h-4 inline mr-1" />Reminder Time (Optional)</label><input type="time" value={reminder} onChange={e => setReminder(e.target.value)} className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white" /></div>
              <div><label className="block text-sm font-medium mb-2"><Icon name="note" className="w-4 h-4 inline mr-1" />Notes (Optional)</label><textarea value={note} onChange={e => setNote(e.target.value)} className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white resize-none" rows="3" placeholder="Add any notes about this habit..." /></div>
              <div className="flex gap-3">
                <button type="button" onClick={onClose} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg font-semibold transition-all">Cancel</button>
                <button type="submit" className="flex-1 py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-lg font-semibold hover:from-emerald-600 hover:to-cyan-600 transition-all">{editHabit ? 'Save Changes' : 'Create Habit'}</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ── Habit Detail Modal ─────────────────────────────────────────────────
    function HabitDetailModal({ habit, onClose, onDelete, onUpdate, onEdit }) {
      if (!habit) return null;
      const stats = calculateStats(habit);
      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in">
          <div className="bg-slate-900 rounded-2xl max-w-3xl w-full border border-slate-700 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div className="flex items-center justify-between p-6 border-b border-slate-700 sticky top-0 bg-slate-900 z-10">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl" style={{ backgroundColor: habit.color + '20', border: `2px solid ${habit.color}` }}>{habit.icon}</div>
                <div><h3 className="text-xl font-bold">{habit.name}</h3><StreakBadge habit={habit} /></div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={onEdit} className="p-2 hover:bg-slate-800 rounded-lg transition-all"><Icon name="edit" className="w-5 h-5" /></button>
                <button onClick={() => { if (confirm('Delete this habit? This action cannot be undone.')) onDelete(habit.id); }} className="p-2 hover:bg-red-500/20 rounded-lg text-red-400 transition-all"><Icon name="trash" className="w-5 h-5" /></button>
                <button onClick={onClose} className="p-2 hover:bg-slate-800 rounded-lg transition-all"><Icon name="x" className="w-5 h-5" /></button>
              </div>
            </div>
            <div className="p-6 space-y-6">
              <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                {[
                  { icon: 'flame', color: 'text-orange-400', label: 'Current Streak', value: stats.currentStreak },
                  { icon: 'trophy', color: 'text-yellow-400', label: 'Best Streak', value: stats.bestStreak },
                  { icon: 'target', color: 'text-emerald-400', label: '30-Day Rate', value: `${stats.completionRate}%` },
                  { icon: 'zap', color: 'text-cyan-400', label: '7-Day Rate', value: `${stats.weeklyRate}%` },
                  { icon: 'calendar', color: 'text-purple-400', label: 'Total Days', value: stats.totalDays },
                  { icon: 'star', color: 'text-pink-400', label: 'Type', value: habit.type, capitalize: true },
                ].map(s => (
                  <div key={s.label} className="bg-slate-800/50 rounded-xl p-4">
                    <div className={`flex items-center gap-2 ${s.color} mb-2`}><Icon name={s.icon} className="w-4 h-4" /><span className="text-sm">{s.label}</span></div>
                    <p className={`text-2xl font-bold ${s.capitalize ? 'capitalize' : ''}`}>{s.value}</p>
                  </div>
                ))}
              </div>
              {(habit.reminder || habit.note) && (
                <div className="bg-slate-800/50 rounded-xl p-4">
                  <h4 className="font-semibold mb-3">Details</h4>
                  {habit.reminder && <div className="flex items-center gap-2 text-slate-300 mb-2"><Icon name="bell" className="w-4 h-4" /><span>Reminder: {habit.reminder}</span></div>}
                  {habit.note && <div className="flex items-start gap-2 text-slate-300"><Icon name="note" className="w-4 h-4 mt-1" /><span>{habit.note}</span></div>}
                </div>
              )}
              <div><h4 className="font-semibold mb-4">90-Day History</h4><HeatmapGrid habit={habit} /></div>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════
    //  MAIN APP
    // ══════════════════════════════════════════════════════════════════════
    function HabitTracker() {
      const [habits, setHabits] = useState([]);
      const [activeView, setActiveView] = useState('today');
      const [selectedHabit, setSelectedHabit] = useState(null);
      const [showAddHabit, setShowAddHabit] = useState(false);
      const [editingHabit, setEditingHabit] = useState(null);
      const [currentDate, setCurrentDate] = useState(new Date());
      const [settings, setSettings] = useState({ darkMode: true, reminders: true, sounds: true });
      const { notifications, addNotification } = useNotifications();

      useEffect(() => {
        const saved = localStorage.getItem('habit-tick-data');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            setHabits(parsed.habits || []);
            if (parsed.settings) setSettings(parsed.settings);
          } catch { loadDemoHabits(); }
        } else { loadDemoHabits(); }
      }, []);

      function loadDemoHabits() {
        const demo = [
          { id: '1', name: 'Morning Meditation', icon: '🧘', color: '#8B5CF6', type: 'check', goal: 'daily', reminder: '07:00', note: 'Start the day with mindfulness', completions: generateDemoData(85) },
          { id: '2', name: 'Read 30 min', icon: '📚', color: '#10B981', type: 'time', goal: 'daily', targetMinutes: 30, reminder: '21:00', completions: generateDemoData(70) },
          { id: '3', name: 'Workout', icon: '💪', color: '#F59E0B', type: 'check', goal: 'daily', reminder: '06:30', note: '30 minutes minimum', completions: generateDemoData(65) },
          { id: '4', name: 'Drink Water', icon: '💧', color: '#3B82F6', type: 'counter', goal: 'daily', targetCount: 8, note: '8 glasses per day', completions: generateDemoData(90) },
          { id: '5', name: 'Code Practice', icon: '💻', color: '#EC4899', type: 'time', goal: 'daily', targetMinutes: 60, reminder: '14:00', completions: generateDemoData(75) },
          { id: '6', name: 'Gratitude Journal', icon: '✨', color: '#14B8A6', type: 'check', goal: 'daily', reminder: '22:00', note: "Write 3 things I'm grateful for", completions: generateDemoData(80) },
        ];
        setHabits(demo);
        addNotification('👋 Welcome! Demo habits loaded', 'info');
      }

      useEffect(() => { if (habits.length > 0) localStorage.setItem('habit-tick-data', JSON.stringify({ habits, settings })); }, [habits, settings]);

      const addHabit = (habitData) => {
        if (editingHabit) { setHabits(habits.map(h => h.id === editingHabit.id ? habitData : h)); addNotification('✏️ Habit updated!', 'success'); setEditingHabit(null); }
        else { setHabits([...habits, { id: Date.now().toString(), ...habitData, completions: {} }]); addNotification('🎉 New habit created!', 'success'); }
        setShowAddHabit(false);
      };
      const deleteHabit = (id) => { setHabits(habits.filter(h => h.id !== id)); setSelectedHabit(null); addNotification('🗑️ Habit deleted', 'info'); };
      const updateHabit = (id, updates) => setHabits(habits.map(h => h.id === id ? { ...h, ...updates } : h));
      const toggleHabit = (habitId, date) => {
        const dateStr = date.toISOString().split('T')[0];
        setHabits(habits.map(habit => {
          if (habit.id !== habitId) return habit;
          const newC = { ...habit.completions };
          if (newC[dateStr]) { delete newC[dateStr]; } else { newC[dateStr] = { completed: true, timestamp: Date.now() }; }
          return { ...habit, completions: newC };
        }));
      };
      const updateHabitValue = (habitId, date, value) => {
        const dateStr = date.toISOString().split('T')[0];
        setHabits(habits.map(habit => {
          if (habit.id !== habitId) return habit;
          return { ...habit, completions: { ...habit.completions, [dateStr]: { completed: true, value, timestamp: Date.now() } } };
        }));
      };

      const navItems = [
        { id: 'today', icon: 'target', label: 'Today' },
        { id: 'todo', icon: 'listCheck', label: 'To-Do' },
        { id: 'pomodoro', icon: 'tomato', label: 'Pomodoro' },
        { id: 'calendar', icon: 'calendar', label: 'Calendar' },
        { id: 'analytics', icon: 'barChart', label: 'Analytics' },
        { id: 'settings', icon: 'settings', label: 'Settings' },
      ];

      return (
        <div className="min-h-screen bg-slate-900 text-white">
          <NotificationContainer notifications={notifications} />
          <header className="border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-xl flex items-center justify-center">
                  <Icon name="check" className="w-6 h-6 text-slate-900" />
                </div>
                <div>
                  <h1 className="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">Habit Tick</h1>
                  <p className="text-xs text-slate-400">Build lasting habits</p>
                </div>
              </div>
              <nav className="flex gap-1">
                {navItems.map(view => (
                  <button key={view.id} onClick={() => setActiveView(view.id)}
                    className={`px-3 py-2 rounded-lg transition-all flex items-center gap-2 ${activeView === view.id ? 'bg-slate-800 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'}`}
                    title={view.label}>
                    <Icon name={view.icon} className="w-4 h-4" />
                    <span className="hidden md:inline text-sm">{view.label}</span>
                    {view.id === 'pomodoro' && <span className="hidden md:inline text-xs bg-red-500/20 text-red-400 px-1.5 py-0.5 rounded-full font-semibold">NEW</span>}
                    {view.id === 'todo' && <span className="hidden md:inline text-xs bg-cyan-500/20 text-cyan-400 px-1.5 py-0.5 rounded-full font-semibold">NEW</span>}
                  </button>
                ))}
              </nav>
            </div>
          </header>
          <main className="max-w-7xl mx-auto px-4 py-8">
            {activeView === 'today' && <TodayView habits={habits} currentDate={currentDate} toggleHabit={toggleHabit} updateHabitValue={updateHabitValue} onHabitClick={setSelectedHabit} onAddClick={() => setShowAddHabit(true)} addNotification={addNotification} settings={settings} />}
            {activeView === 'todo' && <TodoView addNotification={addNotification} />}
            {activeView === 'pomodoro' && <PomodoroView habits={habits} addNotification={addNotification} />}
            {activeView === 'calendar' && <CalendarView habits={habits} currentDate={currentDate} setCurrentDate={setCurrentDate} onHabitClick={setSelectedHabit} />}
            {activeView === 'analytics' && <AnalyticsView habits={habits} />}
            {activeView === 'settings' && <SettingsView settings={settings} onSettingsChange={setSettings} habits={habits} onExport={() => exportData(habits)} onImport={setHabits} addNotification={addNotification} />}
          </main>
          {(showAddHabit || editingHabit) && <AddHabitModal onClose={() => { setShowAddHabit(false); setEditingHabit(null); }} onAdd={addHabit} editHabit={editingHabit} />}
          {selectedHabit && <HabitDetailModal habit={habits.find(h => h.id === selectedHabit)} onClose={() => setSelectedHabit(null)} onDelete={deleteHabit} onUpdate={updateHabit} onEdit={() => { const h = habits.find(h => h.id === selectedHabit); setEditingHabit(h); setSelectedHabit(null); }} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<HabitTracker />);
  </script>
</body>
</html>
