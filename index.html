<!DOCTYPE html>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    * { font-family: 'Inter', sans-serif; }
    body { margin: 0; padding: 0; overflow-x: hidden; }
    
    .animate-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .habit-card { transition: all 0.2s ease; }
    .habit-card:hover { transform: translateY(-2px); }
    .pulse-animation { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .confetti {
      position: fixed; width: 10px; height: 10px; background: #f0f;
      animation: confetti-fall 3s ease-out forwards; pointer-events: none; z-index: 9999;
    }
    @keyframes confetti-fall {
      to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
    .notification-toast { animation: slideInRight 0.3s ease-out; }
    @keyframes slideInRight {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* Pomodoro styles */
    .pomodoro-ring {
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
    .pomodoro-ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 10;
    }
    .pomodoro-ring-progress {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
    }
    @keyframes pomodoroTick {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .pomo-tick { animation: pomodoroTick 1s ease-in-out; }
    @keyframes sessionPop {
      0% { transform: scale(0.7); opacity: 0; }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    .session-pop { animation: sessionPop 0.35s ease-out forwards; }
    .pomo-btn {
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }
    .pomo-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: inherit;
    }
    .pomo-btn:hover::after { opacity: 1; }
    .pomo-btn:active { transform: scale(0.96); }
    @keyframes breakPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.3); }
      50% { box-shadow: 0 0 0 16px rgba(52, 211, 153, 0); }
    }
    .break-pulse { animation: breakPulse 2.5s ease-in-out infinite; }
    @keyframes workPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.25); }
      50% { box-shadow: 0 0 0 16px rgba(239, 68, 68, 0); }
    }
    .work-pulse { animation: workPulse 2s ease-in-out infinite; }

    // ── Notifications ──────────────────────────────────────────────────────
    function useNotifications() {
      const [notifications, setNotifications] = useState([]);
      const addNotification = (message, type = 'info') => {
        const id = Date.now();
        setNotifications(prev => [...prev, { id, message, type }]);
        setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 3000);
      };
      return { notifications, addNotification };
    }

    function NotificationContainer({ notifications }) {
      return (
        <div className="fixed top-20 right-4 z-50 space-y-2">
          {notifications.map(notif => (
            <div key={notif.id} className={`notification-toast px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 ${notif.type === 'success' ? 'bg-emerald-500' : notif.type === 'error' ? 'bg-red-500' : 'bg-blue-500'}`}>
              <span className="text-white">{notif.message}</span>
            </div>
          ))}
        </div>
      );
    }

    // ── Confetti ───────────────────────────────────────────────────────────
    function createConfetti() {
      const colors = ['#10B981', '#3B82F6', '#F59E0B', '#EC4899', '#8B5CF6'];
      for (let i = 0; i < 50; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + '%';
        el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
      }
    }

    // ── Utility ────────────────────────────────────────────────────────────
    function getCurrentStreak(habit) {
      let streak = 0;
      const today = new Date();
      for (let i = 0; i < 365; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        if (habit.completions[dateStr]?.completed) { streak++; }
        else if (i > 0) { break; }
      }
      return streak;
    }

    function calculateStats(habit) {
      const today = new Date();
      const last30Days = [], last7Days = [];
      for (let i = 0; i < 30; i++) {
        const date = new Date(today); date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        if (habit.completions[dateStr]?.completed) { last30Days.push(dateStr); if (i < 7) last7Days.push(dateStr); }
      }
      const currentStreak = getCurrentStreak(habit);
      let bestStreak = 0, tempStreak = 0;
      for (let i = 0; i < 365; i++) {
        const date = new Date(today); date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        if (habit.completions[dateStr]?.completed) { tempStreak++; bestStreak = Math.max(bestStreak, tempStreak); }
        else { tempStreak = 0; }
      }
      return {
        currentStreak, bestStreak,
        completionRate: Math.round((last30Days.length / 30) * 100),
        weeklyRate: Math.round((last7Days.length / 7) * 100),
        totalDays: Object.values(habit.completions).length
      };
    }

    function generateDemoData(consistency) {
      const data = {};
      const today = new Date();
      for (let i = 0; i < 90; i++) {
        const date = new Date(today); date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        if (Math.random() * 100 < consistency) {
          data[dateStr] = { completed: true, value: Math.floor(Math.random() * 60) + 10, timestamp: date.getTime() };
        }
      }
      return data;
    }

    function exportData(habits) {
      const data = { version: '1.0', exportDate: new Date().toISOString(), habits };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url;
      a.download = `habit-tick-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click(); URL.revokeObjectURL(url);
    }

    function importData(file, callback) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.habits && Array.isArray(data.habits)) { callback(data.habits); }
          else { alert('Invalid backup file format'); }
        } catch { alert('Error reading backup file'); }
      };
      reader.readAsText(file);
    }

    // ── Small Sub-components ───────────────────────────────────────────────
    function StreakBadge({ habit }) {
      const streak = getCurrentStreak(habit);
      if (streak === 0) return null;
      return (
        <div className="flex items-center gap-1 px-2 py-1 bg-orange-500/20 rounded-full">
          <Icon name="flame" className="w-3 h-3 text-orange-400" />
          <span className="text-xs font-semibold text-orange-400">{streak}</span>
        </div>
      );
    }

    function MiniProgressGrid({ habit }) {
      const days = [];
      const today = new Date();
      for (let i = 13; i >= 0; i--) {
        const date = new Date(today); date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        days.push({ date: dateStr, completed: habit.completions[dateStr]?.completed });

      return (
        <div className="flex gap-1">
          {days.map((day, i) => (

    function HeatmapGrid({ habit }) {
      const days = [];
      const today = new Date();
      for (let i = 89; i >= 0; i--) {
        const date = new Date(today); date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        days.push({ date: dateStr, completed: habit.completions[dateStr]?.completed });

      return (
        <div className="grid grid-cols-10 gap-2">

              style={day.completed ? { backgroundColor: habit.color } : {}} title={day.date} />
          ))}
        </div>

    function Timer({ habit, currentDate, onSave }) {
      const [seconds, setSeconds] = useState(0);
      const [isRunning, setIsRunning] = useState(false);
      const intervalRef = useRef(null);
      useEffect(() => {
        if (isRunning) { intervalRef.current = setInterval(() => setSeconds(s => s + 1), 1000); }
        else { clearInterval(intervalRef.current); }
        return () => clearInterval(intervalRef.current);
      }, [isRunning]);
      const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
      const handleSave = () => { onSave(Math.floor(seconds / 60)); setSeconds(0); setIsRunning(false); };
      return (
        <div className="flex items-center gap-2">
          <span className="text-lg font-mono font-bold min-w-[60px]">{fmt(seconds)}</span>
          <button onClick={() => setIsRunning(!isRunning)} className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all">
            {isRunning ? <Icon name="pause" className="w-4 h-4" /> : <Icon name="play" className="w-4 h-4" />}
          </button>
          {seconds > 0 && (<>
            <button onClick={() => { setSeconds(0); setIsRunning(false); }} className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all"><Icon name="stop" className="w-4 h-4" /></button>
            <button onClick={handleSave} className="px-3 py-2 bg-emerald-500 hover:bg-emerald-600 rounded-lg transition-all text-sm font-medium">Save</button>
          </>)}
        </div>
      );
    }

    function Counter({ habit, currentDate, value = 0, onUpdate }) {
      return (
        <div className="flex items-center gap-2">
          <button onClick={() => onUpdate(Math.max(0, value - 1))} className="w-8 h-8 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all flex items-center justify-center font-bold">-</button>
          <span className="text-lg font-bold min-w-[40px] text-center">{value}</span>
          <button onClick={() => onUpdate(value + 1)} className="w-8 h-8 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all flex items-center justify-center font-bold">+</button>
          <span className="text-sm text-slate-400">/ {habit.targetCount || 1}</span>
        </div>
