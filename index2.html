<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tick - Best Daily Habit Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    * {
      font-family: 'Inter', sans-serif;
    }
    
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .animate-in {
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .habit-card {
      transition: all 0.2s ease;
    }
    
    .habit-card:hover {
      transform: translateY(-2px);
    }
    
    .pulse-animation {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: .5;
      }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: #f0f;
      animation: confetti-fall 3s ease-out forwards;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    .notification-toast {
      animation: slideInRight 0.3s ease-out;
    }

    @keyframes slideInRight {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .fade-in {
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
  </style>
</head>

    // Notification System
    function useNotifications() {
      const [notifications, setNotifications] = useState([]);

      const addNotification = (message, type = 'info') => {
        const id = Date.now();
        setNotifications(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
          setNotifications(prev => prev.filter(n => n.id !== id));
        }, 3000);
      };

      return { notifications, addNotification };
    }

    // Confetti Effect
    function createConfetti() {
      const colors = ['#10B981', '#3B82F6', '#F59E0B', '#EC4899', '#8B5CF6'];
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }
    }

    // Utility Functions
    function getCurrentStreak(habit) {
      let streak = 0;
      const today = new Date();
      
      for (let i = 0; i < 365; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        
        if (habit.completions[dateStr]?.completed) {
          streak++;
        } else if (i > 0) {
          break;
        }
      }
      
      return streak;
    }

    function calculateStats(habit) {
      const completions = Object.values(habit.completions);
      const last30Days = [];
      const last7Days = [];
      const today = new Date();
      
      for (let i = 0; i < 30; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        if (habit.completions[dateStr]?.completed) {
          last30Days.push(dateStr);
          if (i < 7) last7Days.push(dateStr);
        }
      }
      
      const currentStreak = getCurrentStreak(habit);
      let bestStreak = 0;
      let tempStreak = 0;
      
      for (let i = 0; i < 365; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        
        if (habit.completions[dateStr]?.completed) {
          tempStreak++;
          bestStreak = Math.max(bestStreak, tempStreak);
        } else {
          tempStreak = 0;
        }
      }
      
      return {
        currentStreak,
        bestStreak,
        completionRate: Math.round((last30Days.length / 30) * 100),
        weeklyRate: Math.round((last7Days.length / 7) * 100),
        totalDays: completions.length
      };
    }

    function generateDemoData(consistency) {
      const data = {};
      const today = new Date();
      for (let i = 0; i < 90; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        if (Math.random() * 100 < consistency) {
          data[dateStr] = {
            completed: true,
            value: Math.floor(Math.random() * 60) + 10,
            timestamp: date.getTime()
          };
        }
      }
      return data;
    }

    // Export/Import Functions
    function exportData(habits) {
      const data = {
        version: '1.0',
        exportDate: new Date().toISOString(),
        habits: habits
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `habit-tick-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(file, callback) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.habits && Array.isArray(data.habits)) {
            callback(data.habits);
          } else {
            alert('Invalid backup file format');
          }
        } catch (error) {
          alert('Error reading backup file');
        }
      };
      reader.readAsText(file);
    }

    // Timer Component
    function Timer({ habit, currentDate, onSave }) {
      const [seconds, setSeconds] = useState(0);
      const [isRunning, setIsRunning] = useState(false);
      const intervalRef = useRef(null);

      useEffect(() => {
        if (isRunning) {
          intervalRef.current = setInterval(() => {
            setSeconds(s => s + 1);
          }, 1000);
        } else {
          if (intervalRef.current) {
            clearInterval(intervalRef.current);
          }
        }
        return () => {
          if (intervalRef.current) {
            clearInterval(intervalRef.current);
          }
        };
      }, [isRunning]);

      const formatTime = (secs) => {
        const mins = Math.floor(secs / 60);
        const s = secs % 60;
        return `${mins.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      const handleSave = () => {
        const minutes = Math.floor(seconds / 60);
        onSave(minutes);
        setSeconds(0);
        setIsRunning(false);
      };

      return (
        <div className="flex items-center gap-2">
          <span className="text-lg font-mono font-bold min-w-[60px]">{formatTime(seconds)}</span>
          <button
            onClick={() => setIsRunning(!isRunning)}
            className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all"
          >
            {isRunning ? <Icon name="pause" className="w-4 h-4" /> : <Icon name="play" className="w-4 h-4" />}
          </button>
          {seconds > 0 && (
            <>
              <button
                onClick={() => {
                  setSeconds(0);
                  setIsRunning(false);
                }}
                className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all"
              >
                <Icon name="stop" className="w-4 h-4" />
              </button>
              <button
                onClick={handleSave}
                className="px-3 py-2 bg-emerald-500 hover:bg-emerald-600 rounded-lg transition-all text-sm font-medium"
              >
                Save
              </button>
            </>
          )}
        </div>
      );
    }

    // Counter Component
    function Counter({ habit, currentDate, value = 0, onUpdate }) {
      return (
        <div className="flex items-center gap-2">
          <button
            onClick={() => onUpdate(Math.max(0, value - 1))}
            className="w-8 h-8 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all flex items-center justify-center font-bold"
          >
            -
          </button>
          <span className="text-lg font-bold min-w-[40px] text-center">{value}</span>
          <button
            onClick={() => onUpdate(value + 1)}
            className="w-8 h-8 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all flex items-center justify-center font-bold"
          >
            +
          </button>
          <span className="text-sm text-slate-400">/ {habit.targetCount || 1}</span>
        </div>
      );
    }

    // Streak Badge
    function StreakBadge({ habit }) {
      const streak = getCurrentStreak(habit);
      if (streak === 0) return null;
      
      return (
        <div className="flex items-center gap-1 px-2 py-1 bg-orange-500/20 rounded-full">
          <Icon name="flame" className="w-3 h-3 text-orange-400" />
          <span className="text-xs font-semibold text-orange-400">{streak}</span>
        </div>
      );
    }

    // Mini Progress Grid
    function MiniProgressGrid({ habit }) {
      const days = [];
      const today = new Date();
      
      for (let i = 13; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        const isCompleted = habit.completions[dateStr]?.completed;
        days.push({ date: dateStr, completed: isCompleted });
      }

      return (
        <div className="flex gap-1">
          {days.map((day, i) => (
            <div
              key={i}
              className={`flex-1 h-8 rounded transition-all ${
                day.completed
                  ? 'opacity-100'
                  : 'bg-slate-700/30 opacity-50'
              }`}
              style={day.completed ? { backgroundColor: habit.color } : {}}
              title={day.date}
            />
          ))}
        </div>
      );
    }

    // Heatmap Grid
    function HeatmapGrid({ habit }) {
      const days = [];
      const today = new Date();
      
      for (let i = 89; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        const isCompleted = habit.completions[dateStr]?.completed;
        days.push({ date: dateStr, completed: isCompleted });
      }

      return (
        <div className="grid grid-cols-10 gap-2">

    // Today View
    function TodayView({ habits, currentDate, toggleHabit, updateHabitValue, onHabitClick, onAddClick, addNotification, settings }) {
      const todayStr = currentDate.toISOString().split('T')[0];
      const todayHabits = habits.filter(h => h.goal === 'daily' || h.goal === 'weekly');

      const handleToggle = (habitId) => {
        toggleHabit(habitId, currentDate);
        const habit = habits.find(h => h.id === habitId);
        const wasCompleted = habit.completions[todayStr]?.completed;
        
        if (!wasCompleted) {
          addNotification('✅ Habit completed!', 'success');
          const streak = getCurrentStreak(habit);
          if (streak > 0 && streak % 7 === 0) {
            createConfetti();
            addNotification(`🎉 ${streak} day streak!`, 'success');
          }
        }
      };

      const completedToday = todayHabits.filter(h => h.completions[todayStr]?.completed).length;
      const totalToday = todayHabits.length;
      const progressPercent = totalToday > 0 ? (completedToday / totalToday) * 100 : 0;

      return (
        <div className="space-y-6 animate-in">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-3xl font-bold">Today's Habits</h2>
              <p className="text-slate-400 mt-1">
                {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
              </p>
            </div>
            <button
              onClick={onAddClick}
              className="px-4 py-2 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-lg hover:from-emerald-600 hover:to-cyan-600 transition-all flex items-center gap-2"
            >
              <Icon name="plus" className="w-5 h-5" />
              Add Habit
            </button>
          </div>

          {/* Daily Progress Summary */}
          {totalToday > 0 && (
            <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
              <div className="flex items-center justify-between mb-4">
                <div>
                  <h3 className="text-lg font-semibold">Daily Progress</h3>
                  <p className="text-slate-400 text-sm">{completedToday} of {totalToday} completed</p>
                </div>
                <div className="text-3xl font-bold">
                  {Math.round(progressPercent)}%
                </div>
              </div>
              <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
                <div 
                  className="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 transition-all duration-500"
                  style={{ width: `${progressPercent}%` }}
                />
              </div>
            </div>
          )}

          {todayHabits.length === 0 && (
            <div className="text-center py-16">
              <div className="text-6xl mb-4">🎯</div>
              <p className="text-slate-400 text-lg mb-4">No habits yet. Create your first one!</p>
              <button
                onClick={onAddClick}
                className="px-6 py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-lg hover:from-emerald-600 hover:to-cyan-600 transition-all"
              >
                <Icon name="plus" className="w-5 h-5 inline mr-2" />
                Create Habit
              </button>
            </div>
          )}

          <div className="grid gap-4">
            {todayHabits.map(habit => {
              const isCompleted = habit.completions[todayStr]?.completed;
              const value = habit.completions[todayStr]?.value || 0;
              
              return (
                <div
                  key={habit.id}
                  className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50 hover:border-slate-600 transition-all cursor-pointer group habit-card"
                >
                  <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-4 flex-1" onClick={() => onHabitClick(habit.id)}>
                      <div
                        className="w-14 h-14 rounded-xl flex items-center justify-center text-2xl transition-transform group-hover:scale-110"
                        style={{ backgroundColor: habit.color + '20', border: `2px solid ${habit.color}` }}
                      >
                        {habit.icon}
                      </div>
                      
                      <div className="flex-1">
                        <h3 className="text-lg font-semibold">{habit.name}</h3>
                        <div className="flex items-center gap-4 mt-1">
                          <StreakBadge habit={habit} />
                          {habit.reminder && (
                            <div className="flex items-center gap-1 text-xs text-slate-400">
                              <Icon name="bell" className="w-3 h-3" />
                              {habit.reminder}
                            </div>
                          )}
                        </div>
                      </div>
                    </div>

                    <div onClick={(e) => e.stopPropagation()}>
                      {habit.type === 'check' && (
                        <button
                          onClick={() => handleToggle(habit.id)}
                          className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${
                            isCompleted
                              ? 'bg-gradient-to-br from-emerald-500 to-cyan-500'
                              : 'border-2 border-slate-600 hover:border-emerald-500'
                          }`}
                        >
                          {isCompleted && <Icon name="check" className="w-6 h-6" />}

    // Calendar View
    function CalendarView({ habits, currentDate, setCurrentDate, onHabitClick }) {
      const [viewMonth, setViewMonth] = useState(new Date());
      
      const daysInMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0).getDate();
      const firstDay = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1).getDay();
      
      const prevMonth = () => {
        setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1));
      };
      
      const nextMonth = () => {
        setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1));
      };

      return (
        <div className="space-y-6 animate-in">
          <div className="flex items-center justify-between">
            <h2 className="text-3xl font-bold">Calendar</h2>
            <div className="flex items-center gap-4">
              <button onClick={prevMonth} className="p-2 hover:bg-slate-800 rounded-lg transition-all">
                <Icon name="chevronLeft" className="w-5 h-5" />
              </button>
              <span className="text-lg font-semibold min-w-[180px] text-center">
                {viewMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
              </span>
              <button onClick={nextMonth} className="p-2 hover:bg-slate-800 rounded-lg transition-all">
                <Icon name="chevronRight" className="w-5 h-5" />
              </button>
            </div>
          </div>

          {habits.length === 0 && (
            <div className="text-center py-16">
              <div className="text-6xl mb-4">📅</div>
              <p className="text-slate-400 text-lg">No habits to display</p>
            </div>
          )}

          {habits.map(habit => (
            <div
              key={habit.id}
              className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50"
            >
              <div className="flex items-center gap-3 mb-4">
                <div
                  className="w-10 h-10 rounded-lg flex items-center justify-center text-xl"
                  style={{ backgroundColor: habit.color + '20', border: `2px solid ${habit.color}` }}
                >
                  {habit.icon}
                </div>
                <div className="flex-1">
                  <h3 className="text-lg font-semibold">{habit.name}</h3>
                  <StreakBadge habit={habit} />
                </div>
              </div>

              <div className="grid grid-cols-7 gap-2">
                {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                  <div key={day} className="text-center text-xs text-slate-500 font-medium py-2">
                    {day}
                  </div>
                ))}
                
                {[...Array(firstDay)].map((_, i) => (
                  <div key={`empty-${i}`} />
                ))}
                
                {[...Array(daysInMonth)].map((_, i) => {
                  const day = i + 1;
                  const date = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), day);
                  const dateStr = date.toISOString().split('T')[0];
                  const isCompleted = habit.completions[dateStr]?.completed;
                  const isToday = dateStr === new Date().toISOString().split('T')[0];
                  
                  return (
                    <div
                      key={day}
                      className={`aspect-square rounded-lg flex items-center justify-center text-sm transition-all cursor-pointer ${
                        isCompleted
                          ? 'opacity-100'
                          : 'bg-slate-700/30 opacity-50'
                      } ${isToday ? 'ring-2 ring-cyan-400' : ''}`}
                      style={isCompleted ? { backgroundColor: habit.color } : {}}
                    >
                      {day}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

                    <div className="flex justify-between items-center">

    // Add/Edit Habit Modal
    function AddHabitModal({ onClose, onAdd, editHabit }) {
      const [name, setName] = useState(editHabit?.name || '');
      const [icon, setIcon] = useState(editHabit?.icon || '✅');
      const [color, setColor] = useState(editHabit?.color || '#8B5CF6');
      const [type, setType] = useState(editHabit?.type || 'check');
      const [goal, setGoal] = useState(editHabit?.goal || 'daily');
      const [reminder, setReminder] = useState(editHabit?.reminder || '');
      const [note, setNote] = useState(editHabit?.note || '');
      const [targetMinutes, setTargetMinutes] = useState(editHabit?.targetMinutes || 30);
      const [targetCount, setTargetCount] = useState(editHabit?.targetCount || 8);

      const colors = ['#8B5CF6', '#10B981', '#F59E0B', '#3B82F6', '#EC4899', '#14B8A6', '#EF4444', '#6366F1', '#F97316', '#84CC16'];
      const icons = ['✅', '🧘', '📚', '💪', '💧', '💻', '✨', '🎯', '🏃', '🎨', '🎵', '🍎', '😴', '🧠', '❤️', '🌟', '🔥', '⚡', '🌱', '🎓'];

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!name.trim()) return;
        
        const habitData = {
          name: name.trim(),
          icon,
          color,
          type,
          goal,
          reminder: reminder.trim(),
          note: note.trim(),
          targetMinutes: type === 'time' ? targetMinutes : undefined,
          targetCount: type === 'counter' ? targetCount : undefined
        };

        if (editHabit) {
          onAdd({ ...editHabit, ...habitData });
        } else {
          onAdd(habitData);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in">
          <div className="bg-slate-900 rounded-2xl max-w-2xl w-full border border-slate-700 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div className="flex items-center justify-between p-6 border-b border-slate-700 sticky top-0 bg-slate-900 z-10">
              <h3 className="text-xl font-bold">{editHabit ? 'Edit Habit' : 'New Habit'}</h3>
              <button onClick={onClose} className="p-2 hover:bg-slate-800 rounded-lg transition-all">
                <Icon name="x" className="w-5 h-5" />
              </button>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-6">
              <div>
                <label className="block text-sm font-medium mb-2">Habit Name *</label>
                <input
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white"
                  placeholder="e.g., Morning Meditation"
                  autoFocus
                  required
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2">Icon</label>
                <div className="grid grid-cols-10 gap-2">
                  {icons.map(i => (
                    <button
                      key={i}
                      type="button"
                      onClick={() => setIcon(i)}
                      className={`aspect-square rounded-lg flex items-center justify-center text-2xl transition-all ${
                        icon === i ? 'bg-slate-700 ring-2 ring-emerald-500' : 'bg-slate-800 hover:bg-slate-700'
                      }`}
                    >
                      {i}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium mb-2">Color</label>
                <div className="grid grid-cols-10 gap-2">
                  {colors.map(c => (
                    <button
                      key={c}
                      type="button"
                      onClick={() => setColor(c)}
                      className={`aspect-square rounded-lg transition-all ${
                        color === c ? 'ring-2 ring-white ring-offset-2 ring-offset-slate-900' : ''
                      }`}
                      style={{ backgroundColor: c }}
                    />
                  ))}
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium mb-2">Type</label>
                <div className="grid grid-cols-3 gap-2">
                  {[
                    { value: 'check', label: 'Checkmark', desc: 'Simple yes/no' },
                    { value: 'time', label: 'Timer', desc: 'Track minutes' },
                    { value: 'counter', label: 'Counter', desc: 'Count times' }
                  ].map(t => (
                    <button
                      key={t.value}
                      type="button"
                      onClick={() => setType(t.value)}
                      className={`px-4 py-3 rounded-lg transition-all text-left ${
                        type === t.value
                          ? 'bg-emerald-500 text-white'
                          : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                      }`}
                    >
                      <div className="font-semibold">{t.label}</div>
                      <div className="text-xs opacity-75">{t.desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              {type === 'time' && (
                <div>
                  <label className="block text-sm font-medium mb-2">Target Minutes</label>
                  <input
                    type="number"
                    value={targetMinutes}
                    onChange={(e) => setTargetMinutes(parseInt(e.target.value))}
                    className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white"
                    min="1"
                  />
                </div>
              )}

              {type === 'counter' && (
                <div>
                  <label className="block text-sm font-medium mb-2">Target Count</label>
                  <input
                    type="number"
                    value={targetCount}
                    onChange={(e) => setTargetCount(parseInt(e.target.value))}
                    className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white"
                    min="1"
                  />
                </div>
              )}

              <div>
                <label className="block text-sm font-medium mb-2">Goal Frequency</label>
                <div className="grid grid-cols-2 gap-2">
                  {[
                    { value: 'daily', label: 'Daily' },
                    { value: 'weekly', label: 'Weekly' }
                  ].map(g => (
                    <button
                      key={g.value}
                      type="button"
                      onClick={() => setGoal(g.value)}
                      className={`px-4 py-2 rounded-lg transition-all ${
                        goal === g.value
                          ? 'bg-emerald-500 text-white'
                          : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                      }`}
                    >
                      {g.label}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium mb-2">
                  <Icon name="bell" className="w-4 h-4 inline mr-1" />
                  Reminder Time (Optional)
                </label>
                <input
                  type="time"
                  value={reminder}
                  onChange={(e) => setReminder(e.target.value)}
                  className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white"
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2">
                  <Icon name="note" className="w-4 h-4 inline mr-1" />
                  Notes (Optional)
                </label>
                <textarea
                  value={note}
                  onChange={(e) => setNote(e.target.value)}
                  className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white resize-none"
                  rows="3"
                  placeholder="Add any notes about this habit..."
                />
              </div>

              <div className="flex gap-3">
                <button
                  type="button"
                  onClick={onClose}
                  className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg font-semibold transition-all"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  className="flex-1 py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-lg font-semibold hover:from-emerald-600 hover:to-cyan-600 transition-all"
                >
                  {editHabit ? 'Save Changes' : 'Create Habit'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // Habit Detail Modal
    function HabitDetailModal({ habit, onClose, onDelete, onUpdate, onEdit }) {
      if (!habit) return null;

      const stats = calculateStats(habit);

      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in">
          <div className="bg-slate-900 rounded-2xl max-w-3xl w-full border border-slate-700 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div className="flex items-center justify-between p-6 border-b border-slate-700 sticky top-0 bg-slate-900 z-10">
              <div className="flex items-center gap-3">
                <div
                  className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl"
                  style={{ backgroundColor: habit.color + '20', border: `2px solid ${habit.color}` }}
                >
                  {habit.icon}
                </div>
                <div>
                  <h3 className="text-xl font-bold">{habit.name}</h3>
                  <StreakBadge habit={habit} />
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button
                  onClick={onEdit}
                  className="p-2 hover:bg-slate-800 rounded-lg transition-all"
                >
                  <Icon name="edit" className="w-5 h-5" />
                </button>
                <button
                  onClick={() => {
                    if (confirm('Delete this habit? This action cannot be undone.')) {
                      onDelete(habit.id);
                    }
                  }}
                  className="p-2 hover:bg-red-500/20 rounded-lg text-red-400 transition-all"
                >
                  <Icon name="trash" className="w-5 h-5" />
                </button>
                <button onClick={onClose} className="p-2 hover:bg-slate-800 rounded-lg transition-all">
                  <Icon name="x" className="w-5 h-5" />
                </button>
              </div>
            </div>

            <div className="p-6 space-y-6">
              {/* Statistics Grid */}
              <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div className="bg-slate-800/50 rounded-xl p-4">
                  <div className="flex items-center gap-2 text-orange-400 mb-2">
                    <Icon name="flame" className="w-4 h-4" />
                    <span className="text-sm">Current Streak</span>
                  </div>
                  <p className="text-2xl font-bold">{stats.currentStreak}</p>
                </div>
                <div className="bg-slate-800/50 rounded-xl p-4">
                  <div className="flex items-center gap-2 text-yellow-400 mb-2">
                    <Icon name="trophy" className="w-4 h-4" />
                    <span className="text-sm">Best Streak</span>
                  </div>
                  <p className="text-2xl font-bold">{stats.bestStreak}</p>
                </div>
                <div className="bg-slate-800/50 rounded-xl p-4">
                  <div className="flex items-center gap-2 text-emerald-400 mb-2">
                    <Icon name="target" className="w-4 h-4" />
                    <span className="text-sm">30-Day Rate</span>
                  </div>
                  <p className="text-2xl font-bold">{stats.completionRate}%</p>
                </div>
                <div className="bg-slate-800/50 rounded-xl p-4">
                  <div className="flex items-center gap-2 text-cyan-400 mb-2">
                    <Icon name="zap" className="w-4 h-4" />
                    <span className="text-sm">7-Day Rate</span>
                  </div>
                  <p className="text-2xl font-bold">{stats.weeklyRate}%</p>
                </div>
                <div className="bg-slate-800/50 rounded-xl p-4">
                  <div className="flex items-center gap-2 text-purple-400 mb-2">
                    <Icon name="calendar" className="w-4 h-4" />
                    <span className="text-sm">Total Days</span>
                  </div>
                  <p className="text-2xl font-bold">{stats.totalDays}</p>
                </div>
                <div className="bg-slate-800/50 rounded-xl p-4">
                  <div className="flex items-center gap-2 text-pink-400 mb-2">
                    <Icon name="star" className="w-4 h-4" />
                    <span className="text-sm">Type</span>
                  </div>
                  <p className="text-lg font-bold capitalize">{habit.type}</p>
                </div>
              </div>

              {/* Habit Details */}
              {(habit.reminder || habit.note) && (
                <div className="bg-slate-800/50 rounded-xl p-4">
                  <h4 className="font-semibold mb-3">Details</h4>
                  {habit.reminder && (
                    <div className="flex items-center gap-2 text-slate-300 mb-2">
                      <Icon name="bell" className="w-4 h-4" />
                      <span>Reminder: {habit.reminder}</span>
                    </div>
                  )}
                  {habit.note && (
                    <div className="flex items-start gap-2 text-slate-300">
                      <Icon name="note" className="w-4 h-4 mt-1" />
                      <span>{habit.note}</span>
                    </div>
                  )}
                </div>
              )}

              {/* 90-Day History */}
              <div>
                <h4 className="font-semibold mb-4">90-Day History</h4>
                <HeatmapGrid habit={habit} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Main App Component
    function HabitTracker() {
      const [habits, setHabits] = useState([]);
      const [activeView, setActiveView] = useState('today');
      const [selectedHabit, setSelectedHabit] = useState(null);
      const [showAddHabit, setShowAddHabit] = useState(false);
      const [editingHabit, setEditingHabit] = useState(null);
      const [currentDate, setCurrentDate] = useState(new Date());
      const [settings, setSettings] = useState({
        darkMode: true,
        reminders: true,
        sounds: true
      });

      const { notifications, addNotification } = useNotifications();

      // Load habits from localStorage
      useEffect(() => {
        const saved = localStorage.getItem('habit-tick-data');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            setHabits(parsed.habits || []);
            if (parsed.settings) setSettings(parsed.settings);
          } catch (e) {
            console.error('Failed to load habits:', e);
            loadDemoHabits();
          }
        } else {
          loadDemoHabits();
        }
      }, []);

      function loadDemoHabits() {
        const demo = [
          { id: '1', name: 'Morning Meditation', icon: '🧘', color: '#8B5CF6', type: 'check', goal: 'daily', reminder: '07:00', note: 'Start the day with mindfulness', completions: generateDemoData(85) },
          { id: '2', name: 'Read 30 min', icon: '📚', color: '#10B981', type: 'time', goal: 'daily', targetMinutes: 30, reminder: '21:00', completions: generateDemoData(70) },
          { id: '3', name: 'Workout', icon: '💪', color: '#F59E0B', type: 'check', goal: 'daily', reminder: '06:30', note: '30 minutes minimum', completions: generateDemoData(65) },
          { id: '4', name: 'Drink Water', icon: '💧', color: '#3B82F6', type: 'counter', goal: 'daily', targetCount: 8, note: '8 glasses per day', completions: generateDemoData(90) },
          { id: '5', name: 'Code Practice', icon: '💻', color: '#EC4899', type: 'time', goal: 'daily', targetMinutes: 60, reminder: '14:00', completions: generateDemoData(75) },
          { id: '6', name: 'Gratitude Journal', icon: '✨', color: '#14B8A6', type: 'check', goal: 'daily', reminder: '22:00', note: 'Write 3 things I\'m grateful for', completions: generateDemoData(80) },
        ];
        setHabits(demo);
        addNotification('👋 Welcome! Demo habits loaded', 'info');
      }

      // Save habits to localStorage
      useEffect(() => {
        if (habits.length > 0) {
          localStorage.setItem('habit-tick-data', JSON.stringify({ habits, settings }));
        }
      }, [habits, settings]);

      const addHabit = (habitData) => {
        if (editingHabit) {
          setHabits(habits.map(h => h.id === editingHabit.id ? habitData : h));
          addNotification('✏️ Habit updated!', 'success');
          setEditingHabit(null);
        } else {
          const newHabit = {
            id: Date.now().toString(),
            ...habitData,
            completions: {}
          };
          setHabits([...habits, newHabit]);
          addNotification('🎉 New habit created!', 'success');
        }
        setShowAddHabit(false);
      };

      const deleteHabit = (id) => {
        setHabits(habits.filter(h => h.id !== id));
        setSelectedHabit(null);
        addNotification('🗑️ Habit deleted', 'info');
      };

      const updateHabit = (id, updates) => {
        setHabits(habits.map(h => h.id === id ? { ...h, ...updates } : h));
      };

      const toggleHabit = (habitId, date) => {
        const dateStr = date.toISOString().split('T')[0];
        setHabits(habits.map(habit => {
          if (habit.id === habitId) {
            const newCompletions = { ...habit.completions };
            if (newCompletions[dateStr]) {
              delete newCompletions[dateStr];
            } else {
              newCompletions[dateStr] = {
                completed: true,
                timestamp: Date.now()
              };
            }
            return { ...habit, completions: newCompletions };
          }
          return habit;
        }));
      };

      const updateHabitValue = (habitId, date, value) => {
        const dateStr = date.toISOString().split('T')[0];
        setHabits(habits.map(habit => {
          if (habit.id === habitId) {
            const newCompletions = { ...habit.completions };
            newCompletions[dateStr] = {
              completed: true,
              value: value,
              timestamp: Date.now()
            };
            return { ...habit, completions: newCompletions };
          }
          return habit;
        }));
      };

      const handleImport = (importedHabits) => {
        setHabits(importedHabits);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white">
          {/* Notifications */}
          <NotificationContainer notifications={notifications} />

          {/* Header */}
          <header className="border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-xl flex items-center justify-center">
                  <Icon name="check" className="w-6 h-6 text-slate-900" />
                </div>
                <div>
                  <h1 className="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                    Habit Tick
                  </h1>
                  <p className="text-xs text-slate-400">Build lasting habits</p>
                </div>
              </div>
              
              <nav className="flex gap-2">
                {[
                  { id: 'today', icon: 'target', label: 'Today' },
                  { id: 'calendar', icon: 'calendar', label: 'Calendar' },
                  { id: 'analytics', icon: 'barChart', label: 'Analytics' },
                  { id: 'settings', icon: 'settings', label: 'Settings' }
                ].map(view => (
                  <button
                    key={view.id}
                    onClick={() => setActiveView(view.id)}
                    className={`px-3 py-2 rounded-lg transition-all flex items-center gap-2 ${
                      activeView === view.id
                        ? 'bg-slate-800 text-white'
                        : 'text-slate-400 hover:text-white hover:bg-slate-800/50'
                    }`}
                    title={view.label}
                  >
                    <Icon name={view.icon} className="w-4 h-4" />
                    <span className="hidden md:inline text-sm">{view.label}</span>
                  </button>
                ))}
              </nav>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-7xl mx-auto px-4 py-8">
            {activeView === 'today' && (
              <TodayView
                habits={habits}
                currentDate={currentDate}
                toggleHabit={toggleHabit}
                updateHabitValue={updateHabitValue}
                onHabitClick={setSelectedHabit}
                onAddClick={() => setShowAddHabit(true)}
                addNotification={addNotification}
                settings={settings}
              />
            )}
            
            {activeView === 'calendar' && (
              <CalendarView
                habits={habits}
                currentDate={currentDate}
                setCurrentDate={setCurrentDate}
                onHabitClick={setSelectedHabit}
              />
            )}
            
            {activeView === 'analytics' && (
              <AnalyticsView habits={habits} />
            )}

            {activeView === 'settings' && (
              <SettingsView
                settings={settings}
                onSettingsChange={setSettings}
                habits={habits}
                onExport={() => exportData(habits)}
                onImport={handleImport}
                addNotification={addNotification}
              />
            )}
          </main>

          {/* Add/Edit Habit Modal */}
          {(showAddHabit || editingHabit) && (
            <AddHabitModal
              onClose={() => {
                setShowAddHabit(false);
                setEditingHabit(null);
              }}
              onAdd={addHabit}
              editHabit={editingHabit}
            />
          )}

          {/* Habit Detail Modal */}
          {selectedHabit && (
            <HabitDetailModal
              habit={habits.find(h => h.id === selectedHabit)}
              onClose={() => setSelectedHabit(null)}
              onDelete={deleteHabit}
              onUpdate={updateHabit}
              onEdit={() => {
                const habit = habits.find(h => h.id === selectedHabit);
                setEditingHabit(habit);
                setSelectedHabit(null);
              }}
            />
          )}
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HabitTracker />);
  </script>
</body>
</html>
